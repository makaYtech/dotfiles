[window]
opacity = 0.85
decorations = "None"
dynamic_title = true
dimensions = { columns = 120, lines = 40 }

[font]
size = 11.0
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }

[colors]
primary = { background = "#282828", foreground = "#ebdbb2" }
cursor = { text = "#282828", cursor = "#d79921" }
selection = { text = "#ebdbb2", background = "#3c3836" }
normal = { black = "#282828", red = "#cc241d", green = "#98971a", yellow = "#d79921", blue = "#458588", magenta = "#b16286", cyan = "#689d6a", white = "#a89984" }
bright = { black = "#928374", red = "#fb4934", green = "#b8bb26", yellow = "#fabd2f", blue = "#83a598", magenta = "#d3869b", cyan = "#8ec07c", white = "#ebdbb2" }

# URL
[hints]
enabled = [{ regex = "(ipfs:|ipns:|magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\\s]+", command = "xdg-open", post_processing = true, mouse = { enabled = true }}]

[mouse]
hide_when_typing = false
